name: Daily Empty Commit

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger this anytime from the Actions tab

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential to give the action permission to push back to your repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Create empty commit and push
      run: |
        git commit --allow-empty -m "chore: daily automated empty commit"
        git push origin HEAD:${{ github.ref_name }}
